- name: Play for cachyos
  hosts: localhost
  connection: local
  become: true

  pre_tasks:
    - name: Update repositories
      ansible.builtin.package:
        update_cache: true
      changed_when: false

  handlers:
    - name: Import handler to restart systemd-resolved
      ansible.builtin.import_tasks: handlers/restart_systemd_resolved.yml

  tasks:
    - name: Loop through various tasks
      ansible.builtin.include_tasks: "tasks/{{ item }}"
      loop:
        - fix_kevin_shell.yml
        - packages.yml
        - install_aur_package.yml
        - fix_mdns.yml
        - configure_cctv.yml
        - make_vim_default.yml
        - copy_ssh_stuff.yml
        - workaround_gpu_issue.yml
        - configure_tailscale.yml
#        - show_facts.yml
