- name: Play for cachyos
  hosts: localhost
  connection: local
  become: true

  pre_tasks:
    - name: Update repositories
      ansible.builtin.package:
        update_cache: true
      changed_when: false

  tasks:
    - name: Fix Kevin Shell
      ansible.builtin.include_tasks: "{{ item }}"
      loop:
        - tasks/fix_kevin_shell.yml
        - tasks/packages.yml
        - tasks/install_aur_package.yml
        - tasks/fix_mdns.yml
        - tasks/configure_cctv.yml
        - tasks/make_vim_default.yml
